kind = "web"
previewPath = "/"
title = "Sports Coach Marketplace"
version = "1.0.0"
id = "artifacts/coach-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21047

[services.development]
run = "pnpm --filter @workspace/coach-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coach-marketplace", "run", "build" ]
publicDir = "artifacts/coach-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21047"
BASE_PATH = "/"
